display_information:
  name: PRFactory
  description: Slack bot for AI-assisted PR automation
  background_color: "#1f2937"
features:
  bot_user:
    display_name: PRFactory
    always_online: false
  slash_commands:
    - command: /prfactory
      description: Create a PR request
      usage_hint: Add invoice export
      should_escape: false
      url: https://example.com/api/slack/events
    - command: /feature
      description: Legacy alias for /prfactory
      usage_hint: Add invoice export
      should_escape: false
      url: https://example.com/api/slack/events
    - command: /prfactory-github
      description: GitHub app install instructions
      usage_hint: Connect GitHub
      should_escape: false
      url: https://example.com/api/slack/events
oauth_config:
  redirect_urls:
    - https://example.com/api/slack/oauth/callback
  scopes:
    bot:
      - chat:write
      - commands
      - channels:read
      - channels:history
      - channels:join
      - groups:read
      - groups:history
      - im:read
      - im:history
      - mpim:read
      - mpim:history
settings:
  event_subscriptions:
    request_url: https://example.com/api/slack/events
    bot_events:
      - app_home_opened
      - member_joined_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://example.com/api/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
