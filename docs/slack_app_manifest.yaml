display_information:
  name: Feature Factory
  description: Slack intake bot for feature requests
  background_color: "#1f2937"
features:
  bot_user:
    display_name: Feature Factory
    always_online: false
  slash_commands:
    - command: /feature
      description: Create a feature request
      usage_hint: Add invoice export
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - channels:read
      - channels:history
      - channels:join
      - groups:read
      - groups:history
      - im:read
      - im:history
      - mpim:read
      - mpim:history
settings:
  event_subscriptions:
    bot_events:
      - member_joined_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
