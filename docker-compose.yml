services:
  api:
    build:
      context: ./orchestrator
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./orchestrator:/app

  worker:
    build:
      context: ./orchestrator
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./orchestrator:/app

  slackbot:
    build:
      context: ./orchestrator
    profiles: ["slack"]
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["python", "-m", "app.slackbot"]
    volumes:
      - ./orchestrator:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: feature
      POSTGRES_PASSWORD: feature
      POSTGRES_DB: feature_factory
    ports:
      - "5432:5432"
    volumes:
      - ff_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature -d feature_factory"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

volumes:
  ff_db:
