services:
  api:
    build:
      context: ./orchestrator
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - ./secrets:/run/secrets:ro

  worker:
    build:
      context: ./orchestrator
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    volumes:
      - ./secrets:/run/secrets:ro

  cleanup:
    build:
      context: ./orchestrator
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "app.cleanup_worker"]
    restart: unless-stopped
    volumes:
      - ./secrets:/run/secrets:ro

  slackbot:
    build:
      context: ./orchestrator
    profiles: ["slack"]
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["python", "-m", "app.slackbot"]
    restart: unless-stopped
    volumes:
      - ./secrets:/run/secrets:ro

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: feature
      POSTGRES_PASSWORD: feature
      POSTGRES_DB: feature_factory
    volumes:
      - ff_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature -d feature_factory"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

volumes:
  ff_db:
