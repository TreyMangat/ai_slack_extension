name: OpenCode Runner

on:
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  models: read

concurrency:
  group: opencode-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run-opencode:
    if: >-
      github.event.issue.pull_request == null &&
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        (endsWith(github.event.comment.user.login, '[bot]') && contains(github.event.comment.body, 'Build context:'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Validate callback secrets pairing
        if: ${{ (secrets.FEATURE_FACTORY_CALLBACK_URL != '' && secrets.FEATURE_FACTORY_WEBHOOK_SECRET == '') || (secrets.FEATURE_FACTORY_CALLBACK_URL == '' && secrets.FEATURE_FACTORY_WEBHOOK_SECRET != '') }}
        run: |
          echo "FEATURE_FACTORY_CALLBACK_URL and FEATURE_FACTORY_WEBHOOK_SECRET must both be set or both be empty."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenCode
        id: opencode
        uses: anomalyco/opencode/github@latest
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || github.token }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: ${{ vars.OPENCODE_MODEL || 'github-copilot/gpt-4.1' }}
          use_github_token: true
          token: ${{ secrets.OPENCODE_GITHUB_TOKEN || github.token }}
          prompt: |
            Implement this issue end-to-end and open a PR.

            Required execution policy:
            - Make only issue-scoped changes.
            - Keep the patch production-safe and test-backed.
            - Run project tests and/or linters before finishing.
            - Include concise release notes in the PR body.
            - Do not merge to main.

            Trigger metadata:
            - Issue: #${{ github.event.issue.number }}
            - Issue title: ${{ github.event.issue.title }}
            - Trigger comment author: ${{ github.event.comment.user.login }}

            Issue body:
            ${{ github.event.issue.body }}

            Trigger comment:
            ${{ github.event.comment.body }}

      - name: Send Feature Factory callback
        if: ${{ always() && secrets.FEATURE_FACTORY_CALLBACK_URL != '' && secrets.FEATURE_FACTORY_WEBHOOK_SECRET != '' }}
        continue-on-error: true
        env:
          CALLBACK_URL: ${{ secrets.FEATURE_FACTORY_CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.FEATURE_FACTORY_WEBHOOK_SECRET }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_STATUS: ${{ job.status }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import re
          import time
          import urllib.request

          issue_body = os.environ.get("ISSUE_BODY", "")
          issue_number = str(os.environ.get("ISSUE_NUMBER", "")).strip()
          repository = str(os.environ.get("REPOSITORY", "")).strip()
          run_id = str(os.environ.get("RUN_ID", "")).strip()
          run_attempt = str(os.environ.get("RUN_ATTEMPT", "")).strip()
          run_status = str(os.environ.get("RUN_STATUS", "")).strip().lower()
          callback_url = str(os.environ.get("CALLBACK_URL", "")).strip()
          callback_secret = str(os.environ.get("CALLBACK_SECRET", "")).strip()
          github_token = str(os.environ.get("GITHUB_TOKEN", "")).strip()

          if not callback_url or not callback_secret:
              print("Callback secrets are not configured; skipping.")
              raise SystemExit(0)

          feature_match = re.search(r"ff-([0-9a-fA-F-]{36})", issue_body)
          if not feature_match:
              print("No feature id found in issue body; skipping callback.")
              raise SystemExit(0)
          feature_id = feature_match.group(1)

          if callback_url.endswith("/"):
              callback_url = callback_url[:-1]
          if not callback_url.endswith("/api/integrations/execution-callback"):
              callback_url = callback_url + "/api/integrations/execution-callback"

          pr_url = ""
          if repository and issue_number and github_token:
              timeline_url = f"https://api.github.com/repos/{repository}/issues/{issue_number}/timeline"
              timeline_req = urllib.request.Request(
                  timeline_url,
                  headers={
                      "Authorization": f"Bearer {github_token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(timeline_req, timeout=20) as resp:
                      timeline_payload = json.loads(resp.read().decode("utf-8"))
                  for item in reversed(timeline_payload):
                      source = item.get("source") or {}
                      source_issue = source.get("issue") or {}
                      pull_request = source_issue.get("pull_request") or {}
                      html_url = str(pull_request.get("html_url") or "").strip()
                      if html_url:
                          pr_url = html_url
                          break
              except Exception as exc:
                  print(f"Failed to resolve PR URL from issue timeline: {exc}")

          callback_event = "pr_opened" if run_status == "success" else "build_failed"
          event_id = f"gh-opencode-{run_id}-{run_attempt}-{issue_number}-{callback_event}"
          payload = {
              "feature_id": feature_id,
              "event": callback_event,
              "github_pr_url": pr_url,
              "preview_url": "",
              "message": f"OpenCode workflow status={run_status} for issue #{issue_number}",
              "actor_id": "github-actions-opencode",
              "event_id": event_id,
              "metadata": {
                  "source": "github-actions",
                  "workflow": "opencode-runner",
                  "repository": repository,
                  "issue_number": issue_number,
                  "run_id": run_id,
                  "run_attempt": run_attempt,
                  "status": run_status,
              },
          }

          body = json.dumps(payload, separators=(",", ":"), ensure_ascii=False).encode("utf-8")
          timestamp = str(int(time.time()))
          signed_payload = f"{timestamp}.".encode("utf-8") + body
          signature = hmac.new(
              callback_secret.encode("utf-8"),
              signed_payload,
              hashlib.sha256,
          ).hexdigest()

          req = urllib.request.Request(
              callback_url,
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "X-Feature-Factory-Timestamp": timestamp,
                  "X-Feature-Factory-Signature": f"sha256={signature}",
                  "X-Feature-Factory-Event-Id": event_id,
              },
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=20) as resp:
              response_body = resp.read().decode("utf-8", errors="replace")
              print(f"Callback HTTP {resp.status}")
              print(response_body)
          PY
